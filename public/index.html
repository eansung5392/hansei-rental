<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한세대학교 대관시스템 (DB 연동형 완본)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght=500;700&family=Roboto+Mono:wght=500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D;
    --ink-soft:#2A3F66;
    --ink-muted:#5B6472;
    --paper:#F6F4EC;
    --paper-raised:#FFFFFF;
    --gold:#C9952C;
    --gold-deep:#9C6F18;
    --line:#DCD6C6;
    --success:#2F6F4F;
    --danger:#B3432B;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Pretendard','-apple-system','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1050px;margin:0 auto;padding:0 24px 20px;}
  
  header.site{
    border-bottom: 3px solid var(--ink);
    padding: 28px 0 20px;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand-en {
    font-family: 'Noto Serif KR', Georgia, serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.5px;
    color: var(--gold);
    text-transform: uppercase;
  }
  h1.site-title{
    font-family:'Noto Serif KR',Georgia,serif;
    font-weight:700;
    font-size:26px;
    margin:0;
    letter-spacing:0.5px;
    color: var(--ink);
  }

  .nav-tabs {
    display: flex;
    width: 100%;
    margin-top: 20px;
    border-bottom: 2px solid var(--ink);
    background: var(--paper-raised);
  }
  .nav-tab {
    flex: 1;
    text-align: center;
    padding: 14px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    color: var(--ink-muted);
    border: 1px solid var(--line);
    border-bottom: none;
    user-select: none;
    transition: all 0.15s ease;
  }
  .nav-tab:hover {
    background: #fdfdfa;
    color: var(--ink);
  }
  .nav-tab.active {
    background: var(--ink);
    color: #FFFFFF;
    border-color: var(--ink);
  }

  .page-content { display: none; margin-top: 25px; min-height: 500px; }
  .page-content.active { display: block; }

  .notice{
    margin-top:22px;
    background:var(--ink);
    color:#EFE9D8;
    border-radius:var(--radius);
    padding:20px 24px 22px;
  }
  .notice-label{
    font-size:11px;
    letter-spacing:2px;
    color:var(--gold);
    font-weight:700;
    margin:0 0 10px;
  }
  .notice ul{margin:0;padding:0;list-style:none;}
  .notice li{
    padding:7px 0;
    border-top:1px solid rgba(239,233,216,0.14);
    font-size:13.5px;
    display:flex;
    gap:10px;
  }
  .notice li:first-child{border-top:none;}
  .notice li .n{color:var(--gold);font-family:'Roboto Mono',monospace;font-size:12px;flex-shrink:0;padding-top:1px;}
  .notice li .star{color:#ffdd67; font-weight:bold;}

  .step{margin-top:40px;}
  .step-head{
    display:flex;align-items:baseline;gap:12px;
    border-bottom:1px solid var(--line);
    padding-bottom:10px;
    margin-bottom:20px;
  }
  .step-num{
    font-family:'Roboto Mono',monospace;
    font-weight:700;font-size:13px;
    color:var(--gold-deep);
    letter-spacing:1px;
  }
  .step-title{
    font-family:'Noto Serif KR',Georgia,serif;
    font-size:19px;font-weight:700;margin:0;
  }

  .cat-filter-wrap {
    margin-bottom: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .btn-filter {
    padding: 8px 16px;
    font-size: 13.5px;
    font-weight: bold;
    border: 1px solid var(--line);
    background: var(--paper-raised);
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
  }
  .btn-filter.active {
    background: var(--gold);
    color: white;
    border-color: var(--gold);
  }

  .grid-cat{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 0;
    width: 100%;
  }
  .cat-cell {
    flex: 1;
    min-width: 220px;
  }
  .cat-card{
    width: 100%;
    background:var(--paper-raised);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:18px 14px;
    text-align:left;
    cursor:pointer;
    transition:all .15s;
    font-family:inherit;
    user-select: none;
    display: block;
  }
  .cat-card:hover{border-color:var(--gold);}
  .cat-card.active{border-color:var(--ink);background:var(--ink);color:#fff;}
  .cat-card .ico{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--gold);display:block;margin-bottom:8px;letter-spacing:1px;}
  .cat-card .name{font-weight:700;font-size:14.5px;display:block;}
  .cat-card .unit{font-size:11.5px;color:var(--ink-muted);display:block;margin-top:4px;}
  .cat-card.active .unit{color:#CBD3E0;}

  .slot-grid{
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    margin-top: 5px;
  }
  .slot-row { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; }
  .slot{
    flex: 1;
    min-width: 180px;
    border:1.5px solid var(--line);border-radius:var(--radius);padding:12px;
    font-size:12.5px;cursor:pointer;background:var(--paper-raised);text-align:left;font-family:inherit;
    transition: all 0.15s ease;
    user-select: none;
  }
  .slot b{display:block;font-size:13.5px;margin-bottom:2px;}
  .slot:hover { border-color: var(--gold); }
  .slot.active{border-color:var(--gold);background:#FBF1DC; color:var(--ink);}
  .slot.disabled{background:#E9E5DA; color:var(--ink-muted); border-color:var(--line); cursor:not-allowed;}

  .form-container { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
  .form-row { display: flex; gap: 14px; width: 100%; flex-wrap: wrap; }
  .form-group { flex: 1; display: flex; flex-direction: column; min-width: 200px; }
  .form-group.full { width: 100%; }
  .field label{display:block;font-size:12px;color:var(--ink-muted);margin-bottom:6px;letter-spacing:.3px;}
  .field input, .field textarea, .field select{
    width:100%;border:1.5px solid var(--line);border-radius:var(--radius);padding:10px 11px;
    font-size:14px;font-family:inherit;background:var(--paper-raised);color:var(--ink);
  }
  .field input:focus, .field textarea:focus, .field select:focus{outline:2px solid var(--gold);border-color:var(--gold);}

  .board{
    margin-top:26px;
    background:var(--ink);
    border-radius:6px;
    padding:26px;
    color:#EFE9D8;
  }
  .board-label{font-size:11px;letter-spacing:2px;color:#9FB0CE;margin:0 0 6px;}
  .board-total{
    font-family:'Roboto Mono',monospace;
    font-weight:700; font-size: 28px; color: var(--gold); margin-bottom: 15px;
  }
  .deposit-info {
    border-top: 1px dashed rgba(239,233,216,0
