<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한세대학교 대관시스템</title>
  <style>
    :root {
      --primary-color: #002F6C; /* 한세대 상징색 네이비 */
      --secondary-color: #8A7355; /* 한세대 상징색 골드 */
      --bg-light: #F4F6F9;
      --text-dark: #333333;
      --border-color: #DDE2E5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', dotum, sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 60px; }
    
    header { background-color: #FFFFFF; border-bottom: 3px solid var(--secondary-color); padding: 20px; text-align: center; }
    header h1 { color: var(--primary-color); font-size: 24px; font-weight: bold; }
    
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { flex: 1; max-width: 200px; padding: 15px; background: none; border: none; color: #FFFFFF; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; transition: background 0.3s; }
    .tab-btn.active { background-color: var(--secondary-color); }
    
    .container { max-width: 1100px; margin: 3px auto; padding: 20px; background: #FFFFFF; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .page { display: none; }
    .page.active { display: block; }
    
    .notice-box { background-color: #FFFBF0; border: 1px solid #F3E5AB; padding: 15px; border-radius: 6px; margin-bottom: 25px; }
    .notice-box h3 { color: var(--secondary-color); margin-bottom: 10px; font-size: 16px; }
    .notice-box ul { padding-left: 20px; font-size: 14px; line-height: 1.6; }

    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: 1px solid var(--border-color); background: #FFF; border-radius: 20px; cursor: pointer; font-size: 14px; }
    .filter-btn.active { background: var(--primary-color); color: #FFF; border-color: var(--primary-color); }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; background: #FFF; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-3px); border-color: var(--primary-color); }
    .card.selected { border: 2px solid var(--primary-color); background-color: #F0F5FA; }
    .card h4 { font-size: 16px; color: var(--primary-color); margin-bottom: 8px; }
    .card .price { font-size: 15px; font-weight: bold; color: var(--secondary-color); }
    
    .section-title { font-size: 18px; color: var(--primary-color); font-weight: bold; margin-bottom: 12px; border-left: 4px solid var(--primary-color); padding-left: 8px; }
    .guide-msg { text-align: center; padding: 20px; color: #777; font-size: 15px; border: 1px dashed var(--border-color); border-radius: 6px; background: #FAFBFB; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; }
    
    .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 15px 0; }
    .time-btn { padding: 12px; border: 1px solid var(--border-color); background: #FFF; border-radius: 4px; text-align: center; cursor: pointer; font-size: 13px; }
    .time-btn.selected { background-color: var(--secondary-color); color: #FFF; border-color: var(--secondary-color); }
    .time-btn.disabled { background-color: #EFEFEF; color: #AAA; cursor: not-allowed; text-decoration: line-through; }
    
    .total-box { background: #F8F9FA; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: bold; text-align: right; margin: 20px 0; border: 1px solid var(--border-color); }
    .total-box span { color: var(--primary-color); font-size: 20px; }
    
    .btn-submit { width: 100%; padding: 15px; background-color: var(--primary-color); color: #FFF; border: none; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    .btn-submit:hover { background-color: #001F47; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
    th, td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
    th { background-color: var(--primary-color); color: #FFF; }
    tr:nth-child(even) { background-color: #F9FAFB; }
    
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .status-WAIT { background-color: #FFF3CD; color: #856404; }
    .status-CONFIRM { background-color: #D4EDDA; color: #155724; }
    
    .admin-sections { display: flex; flex-direction: column; gap: 30px; }
    .admin-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 6px; background: #FFF; }
    .admin-card h3 { margin-bottom: 15px; color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .btn-small { padding: 8px 12px; background: var(--primary-color); color:#FFF; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:bold; }
  </style>
</head>
<body>

  <header>
    <h1>HANSEI UNIVERSITY 대관시스템</h1>
  </header>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
    <button class="tab-btn" onclick="switchTab('status')">예약 현황조회</button>
    <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
  </nav>

  <div class="container">
    
    <div id="page-rent" class="page active">
      <div class="notice-box">
        <h3>NOTICE / 이용 수칙</h3>
        <ul id="notice-list"></ul>
      </div>

      <div class="section-title">1. 대관 날짜 선택</div>
      <div class="form-group">
        <input type="date" id="input-date" onchange="onDateOrCategoryChange()">
      </div>

      <div class="section-title" style="margin-top: 25px;">2. 카테고리 및 시설 선택</div>
      <div class="filter-bar" id="category-filters"></div>
      <div class="grid" id="facility-cards"></div>

      <div id="dynamic-booking-section">
        <div class="guide-msg">날짜와 시설 카드를 모두 선택하시면 상세 대관 신청 양식이 나타납니다.</div>
      </div>
    </div>

    <div id="page-status" class="page">
      <div class="section-title">실시간 예약 대관 현황</div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>시설명</th>
              <th>예약날짜</th>
              <th>사용시간</th>
              <th>신청단체</th>
              <th>대표자</th>
              <th>대관비용</th>
              <th>승인상태</th>
            </tr>
          </thead>
          <tbody id="status-table-rows"></tbody>
        </table>
      </div>
    </div>

    <div id="page-admin" class="page">
      <div class="section-title" style="margin-bottom: 20px;">대관 시스템 관리자 권한제어</div>
      
      <div id="admin-login-box" style="text-align: center; padding: 20px 0;">
        <p style="margin-bottom: 12px; font-weight: bold;">관리자 인증 비밀번호를 입력하세요.</p>
        <input type="password" id="admin-password" placeholder="비밀번호 입력 (기본: 1234)" style="max-width: 250px; padding: 10px; margin-right: 10px;">
        <button class="btn-small" style="padding: 11px 20px;" onclick="checkAdminPassword()">로그인</button>
      </div>

      <div id="admin-content-box" class="admin-sections" style="display: none;">
        <div class="admin-card">
          <h3>공지사항 / 이용수칙 편집</h3>
          <div class="form-group">
            <textarea id="admin-notice-input" rows="4" placeholder="줄바꿈(Enter) 단위로 작성하세요."></textarea>
          </div>
          <button class="btn-small" onclick="saveAdminNotices()">공지사항 전체 업데이트</button>
        </div>

        <div class="admin-card">
          <h3>카테고리 및 시설 금액 설정</h3>
          <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #F8F9FA; padding: 15px; border-radius: 4px;">
            <div style="flex: 1; min-width: 200px;">
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">새 카테고리명</label>
              <input type="text" id="new-cat-name" placeholder="예: 무용실">
            </div>
            <div style="display: flex; align-items: flex-end;">
              <button class="btn-small" style="height:40px;" onclick="addAdminCategory()">카테고리 추가등록</button>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #F8F9FA; padding: 15px; border-radius: 4px;">
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">소속 카테고리 선택</label>
              <select id="new-fac-cat"></select>
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">고유 ID 코드</label>
              <input type="text" id="new-fac-id" placeholder="예: F101">
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">시설명</label>
              <input type="text" id="new-fac-name" placeholder="예: 대학원 세미나룸">
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">기본 단가 (4시간 기준)</label>
              <input type="number" id="new-fac-fee" placeholder="예: 50000">
            </div>
          </div>
          <button class="btn-small" style="margin-top: 15px;" onclick="addAdminFacility()">신규 시설 최종 등록</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    let categoriesData = ['강당/예술', '체육', '회의/세미나'];
    let facilitiesData =
