<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>한세대학교 대관시스템</title>
  <style>
    :root { --primary-color: #002F6C; --secondary-color: #8A7355; --bg-light: #F4F6F9; }
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: var(--bg-light); }
    header { background: #FFF; padding: 20px; text-align: center; border-bottom: 3px solid var(--secondary-color); }
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { padding: 15px 30px; border: none; color: #FFF; font-weight: bold; cursor: pointer; background: none; }
    .tab-btn.active { background-color: var(--secondary-color); }
    .container { max-width: 800px; margin: 20px auto; padding: 20px; background: #FFF; border-radius: 8px; }
    .page { display: none; } .page.active { display: block; }
    .notice-box { background: #FFFDE7; border: 1px solid #FFE082; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
    .card { padding: 15px; border: 1px solid #ccc; margin: 5px 0; cursor: pointer; border-radius: 5px; }
    .card.selected { border: 2px solid var(--primary-color); background: #eef; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
    button { cursor: pointer; padding: 10px; border: none; background: var(--primary-color); color: white; border-radius: 4px; }
  </style>
</head>
<body>

<header><h1>HANSEI UNIVERSITY 대관시스템</h1></header>
<nav class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
  <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
</nav>

<div class="container">
  <div id="page-rent" class="page active">
    <div class="notice-box"><strong>공지사항</strong><p id="notice-content">• 모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.</p></div>
    <b>1. 일자</b><input type="date" id="rent-date">
    <b>2. 장소</b><div id="facility-list"></div>
    <b>3. 정보</b><input type="text" id="group" placeholder="소속"><input type="text" id="name" placeholder="성명"><input type="text" id="phone" placeholder="연락처"><textarea id="memo" placeholder="메모"></textarea>
    <button onclick="submitRent()" style="width:100%; margin-top:10px;">신청 완료</button>
  </div>

  <div id="page-admin" class="page">
    <div id="login-box"><input type="password" id="pw" placeholder="비밀번호"><button onclick="checkAdmin()">로그인</button></div>
    <div id="admin-box" style="display:none;">
      <h3>관리자 대시보드</h3>
      <textarea id="new-notice-text"></textarea><button onclick="updateNotice()">공지사항 적용</button>
      <h3>예약 현황 <button onclick="downloadExcel()" style="background:#28a745;">엑셀 다운로드</button></h3>
      <div id="booking-list"></div>
      <h3>시설 관리</h3>
      <div id="admin-facility-list"></div>
      <input type="text" id="new-name" placeholder="시설명"><input type="text" id="new-fee" placeholder="이용료"><button onclick="addFacility()">시설 추가</button>
    </div>
  </div>
</div>

<script>
  let facilities = JSON.parse(localStorage.getItem('facilities')) || [{id:1, name:'본관 대강당', fee:'300,000원'}];
  let bookings = JSON.parse(localStorage.getItem('myBookings')) || [];
  let selectedFac = "";

  function switchTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    event.target.classList.add('active');
  }

  function updateNotice() {
    const text = document.getElementById('new-notice-text').value;
    document.getElementById('notice-content').innerText = text;
    localStorage.setItem('notice', text);
  }

  function renderUI() {
    document.getElementById('facility-list').innerHTML = facilities.map(f => `<div class="card" onclick="selectFac(this, '${f.name}')">${f.name} (${f.fee})</div>`).join('');
    document.getElementById('admin-facility-list').innerHTML = facilities.map(f => `<div>${f.name} - ${f.fee} <button onclick="delFacility(${f.id})" style="background:#cc0000;">삭제</button></div>`).join('');
  }

  function selectFac(el, name) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedFac = name;
  }

  function submitRent() {
    bookings.push({ id: Date.now(), date: document.getElementById('rent-date').value, fac: selectedFac, group: document.getElementById('group').value, name: document.getElementById('name').value, phone: document.getElementById('phone').value, memo: document.getElementById('memo').value });
    localStorage.setItem('myBookings', JSON.stringify(bookings));
    alert('신청 완료!');
  }

  function checkAdmin() {
    if(document.getElementById('pw').value === '1234') {
      document.getElementById('admin-box').style.display = 'block';
      document.getElementById('login-box').style.display = 'none';
      renderBookings();
    } else alert('비밀번호 오류');
  }

  function renderBookings() {
    document.getElementById('booking-list').innerHTML = bookings.map(b => `
      <div style="border-bottom:1px solid #ccc; padding:10px;"><b>[${b.date}] ${b.fac}</b> <button onclick="delBooking(${b.id})" style="background:#cc0000;">삭제</button><br>소속:${b.group} 성명:${b.name} 연락처:${b.phone}</div>
    `).join('');
  }

  function delBooking(id) {
    bookings = bookings.filter(b => b.id !== id);
    localStorage.setItem('myBookings', JSON.stringify(bookings));
    renderBookings();
  }

  function downloadExcel() {
    let csv = "\uFEFF날짜,장소,소속,성명,연락처,메모\n" + bookings.map(b => `${b.date},${b.fac},${b.group},${b.name},${b.phone},${b.memo}`).join("\n");
    const link = document.createElement("a");
    link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
    link.download = "예약현황.csv";
    link.click();
  }

  function addFacility() { facilities.push({id: Date.now(), name: document.getElementById('new-name').value, fee: document.getElementById('new-fee').value}); localStorage.setItem('facilities', JSON.stringify(facilities)); renderUI(); }
  function delFacility(id) { facilities = facilities.filter(f => f.id !== id); localStorage.setItem('facilities', JSON.stringify(facilities)); renderUI(); }

  document.getElementById('notice-content').innerText = localStorage.getItem('notice') || "• 모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.";
  renderUI();
</script>
</body>
</html>
