<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>한세대학교 대관시스템</title>
  <style>
    :root { --primary-color: #002F6C; --secondary-color: #8A7355; }
    body { font-family: 'Malgun Gothic', sans-serif; background: #F4F6F9; padding: 20px; }
    .container { max-width: 700px; margin: auto; background: #FFF; padding: 30px; border-radius: 12px; }
    .page { display: none; } .page.active { display: block; }
    .notice-box { background: #FFFDE7; border: 1px solid #FFE082; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
    button { padding: 10px; background: #002F6C; color: white; border: none; cursor: pointer; width: 100%; }
    .step-box { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
    .card { padding: 10px; border: 1px solid #ccc; margin: 5px 0; cursor: pointer; }
    .card.selected { background: #eef; border: 2px solid #002F6C; }
  </style>
</head>
<body>

<nav style="text-align:center; margin-bottom:20px;">
  <button onclick="switchTab('rent')" style="width:auto;">대관 신청하기</button>
  <button onclick="switchTab('admin')" style="width:auto;">관리자 대시보드</button>
</nav>

<div class="container">
  <div id="page-rent" class="page active">
    <h3>대관 신청</h3>
    <div class="notice-box" id="display-notice"></div>
    
    <div class="step-box">
      일자: <input type="date" id="rent-date">
    </div>
    <div class="step-box">
      장소: <div id="facility-list"></div>
    </div>
    <div class="step-box">
      정보: <input type="text" id="group" placeholder="소속">
      <input type="text" id="name" placeholder="성명">
      <input type="text" id="phone" placeholder="연락처">
      <textarea id="memo" placeholder="메모"></textarea>
    </div>
    <button onclick="submitRent()">신청 완료</button>
  </div>

  <div id="page-admin" class="page">
    <div id="login-box">
      <input type="password" id="admin-pw" placeholder="비밀번호">
      <button onclick="checkAdmin()">로그인</button>
    </div>
    <div id="admin-box" style="display:none;">
      <h3>공지사항 수정</h3>
      <textarea id="edit-notice" placeholder="공지사항을 입력하세요"></textarea>
      <button onclick="saveNotice()" style="background:#555;">공지사항 저장</button>
      
      <h3>예약 현황</h3>
      <div id="booking-list"></div>
      <button onclick="downloadExcel()" style="background:#28a745; margin-top:10px;">엑셀 다운로드</button>
    </div>
  </div>
</div>

<script>
  // 초기화 및 데이터 로드
  let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
  let notice = localStorage.getItem('notice') || "• 공지사항이 없습니다.";

  // 공지사항 표시 및 수정창 초기화
  document.getElementById('display-notice').innerText = notice;
  document.getElementById('edit-notice').value = notice;

  function switchTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
  }

  function saveNotice() {
    let newNotice = document.getElementById('edit-notice').value;
    localStorage.setItem('notice', newNotice);
    document.getElementById('display-notice').innerText = newNotice;
    alert('공지사항이 적용되었습니다!');
  }

  function submitRent() {
    bookings.push({
      date: document.getElementById('rent-date').value,
      fac: window.selectedFac,
      name: document.getElementById('name').value
    });
    localStorage.setItem('bookings', JSON.stringify(bookings));
    alert('신청 완료!');
  }

  function checkAdmin() {
    if(document.getElementById('admin-pw').value === '1234') {
      document.getElementById('admin-box').style.display = 'block';
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('booking-list').innerHTML = bookings.map(b => `<div>[${b.date}] ${b.fac} / ${b.name}</div>`).join('');
    } else alert('비밀번호 오류');
  }

  function downloadExcel() {
    let csv = "날짜,장소,성명\n" + bookings.map(b => `${b.date},${b.fac},${b.name}`).join("\n");
    const link = document.createElement("a");
    link.href = "data:text/csv;charset=utf-8,\ufeff" + encodeURI(csv);
    link.download = "예약현황.csv";
    link.click();
  }
</script>
</body>
</html>
