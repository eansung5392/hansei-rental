<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>한세대학교 대관시스템 (관리자 기능 포함)</title>
  <style>
    :root { --primary-color: #002F6C; --secondary-color: #8A7355; }
    .page { display: none; }
    .page.active { display: block; }
    .admin-controls { margin-top: 20px; padding: 20px; border: 1px solid #ccc; background: #f9f9f9; }
    .input-row { margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- 탭 메뉴 등 생략 -->
  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
    <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
  </nav>

  <!-- 관리자 대시보드 페이지 -->
  <div id="page-admin" class="page">
    <div id="admin-login">
      <input type="password" id="admin-pw" placeholder="비밀번호">
      <button onclick="checkAdmin()">로그인</button>
    </div>
    
    <div id="admin-panel" class="admin-controls" style="display:none;">
      <h3>관리자 대시보드</h3>
      
      <!-- 1. 공지사항 수정 -->
      <div>
        <h4>1. 공지사항 수정</h4>
        <textarea id="edit-notice" rows="3" style="width:100%"></textarea>
        <button onclick="updateNotice()">공지사항 저장</button>
      </div>

      <!-- 2. 시설 관리 -->
      <div>
        <h4>2. 시설 및 금액 관리</h4>
        <div id="edit-facilities"></div>
      </div>
    </div>
  </div>

  <script>
    let facilities = [
      { id: 1, name: '본관 대강당', fee: '300,000원' },
      { id: 2, name: '실내체육관', fee: '200,000원' },
      { id: 3, name: '국제세미나실', fee: '120,000원' }
    ];

    function checkAdmin() {
      if(document.getElementById('admin-pw').value === '1234') {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        renderAdminFacilities();
      } else { alert('비밀번호 불일치'); }
    }

    // 공지사항 업데이트 로직
    function updateNotice() {
      const newNotice = document.getElementById('edit-notice').value;
      document.querySelector('.notice-box p').innerText = newNotice;
      alert('공지사항이 수정되었습니다.');
    }

    // 시설 및 금액 수정 화면 렌더링
    function renderAdminFacilities() {
      const container = document.getElementById('edit-facilities');
      container.innerHTML = facilities.map(f => `
        <div class="input-row">
          <input type="text" value="${f.name}" id="name-${f.id}">
          <input type="text" value="${f.fee}" id="fee-${f.id}">
          <button onclick="saveFacility(${f.id})">저장</button>
        </div>
      `).join('');
    }

    function saveFacility(id) {
      const idx = facilities.findIndex(f => f.id === id);
      facilities[idx].name = document.getElementById('name-' + id).value;
      facilities[idx].fee = document.getElementById('fee-' + id).value;
      renderFacilities(); // 대관 페이지의 카드 갱신
      alert('시설 정보가 수정되었습니다.');
    }
    
    // ... 나머지 기존 로직
  </script>
</body>
</html>
