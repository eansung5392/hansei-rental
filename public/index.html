<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한세대학교 대관시스템</title>
  <style>
    :root { --primary-color: #002F6C; --secondary-color: #8A7355; --bg-light: #F4F6F9; }
    body { background-color: var(--bg-light); padding-bottom: 60px; font-family: 'Malgun Gothic', sans-serif; }
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #FFF; font-weight: bold; cursor: pointer; }
    .tab-btn.active { background-color: var(--secondary-color); }
    .container { max-width: 1100px; margin: 20px auto; padding: 20px; background: #FFF; border-radius: 8px; }
    .page { display: none; }
    .page.active { display: block; }
    .card { border: 1px solid #DDD; padding: 20px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; }
    .card:hover { border-color: var(--primary-color); }
  </style>
</head>
<body>
  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
    <button class="tab-btn" onclick="switchTab('status')">예약 현황조회</button>
    <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
  </nav>

  <div class="container">
    <div id="page-rent" class="page active">
      <div style="font-weight:bold; margin-bottom:15px;">1. 대관 날짜 선택</div>
      <input type="date" id="input-date" onchange="renderFacilities()" style="width:100%; padding:10px;">
      <div style="font-weight:bold; margin-top:30px; margin-bottom:15px;">2. 시설 선택</div>
      <div id="facility-cards"></div>
    </div>
    <div id="page-status" class="page">준비 중입니다.</div>
    <div id="page-admin" class="page">관리자 페이지입니다.</div>
  </div>

  <script>
    const facilities = [
      { id: 1, name: '본관 대강당', fee: '300,000원' },
      { id: 2, name: '실내체육관', fee: '200,000원' },
      { id: 3, name: '국제세미나실', fee: '120,000원' }
    ];

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('page-' + tabId).classList.add('active');
    }

    function renderFacilities() {
      const cardDiv = document.getElementById('facility-cards');
      cardDiv.innerHTML = facilities.map(f => `
        <div class="card" onclick="alert('${f.name} 선택됨')">
          <strong>${f.name}</strong><br><span>이용료: ${f.fee}</span>
        </div>
      `).join('');
    }

    window.onload = function() {
      document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
      renderFacilities();
    };
  </script>
</body>
</html>
