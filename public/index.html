<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한세대학교 대관시스템</title>
  <style>
    :root {
      --primary-color: #002F6C; /* 한세대 상징색 네이비 */
      --secondary-color: #8A7355; /* 한세대 상징색 골드 */
      --bg-light: #F4F6F9;
      --text-dark: #333333;
      --border-color: #DDE2E5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', dotum, sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 60px; }
    
    header { background-color: #FFFFFF; border-bottom: 3px solid var(--secondary-color); padding: 20px; text-align: center; }
    header h1 { color: var(--primary-color); font-size: 24px; font-weight: bold; }
    
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { flex: 1; max-width: 200px; padding: 15px; background: none; border: none; color: #FFFFFF; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; transition: background 0.3s; }
    .tab-btn.active { background-color: var(--secondary-color); }
    
    .container { max-width: 1100px; margin: 20px auto; padding: 20px; background: #FFFFFF; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .page { display: none; }
    .page.active { display: block; }
    
    .notice-box { background-color: #FFFBF0; border: 1px solid #F3E5AB; padding: 15px; border-radius: 6px; margin-bottom: 25px; }
    .notice-box h3 { color: var(--secondary-color); margin-bottom: 10px; font-size: 16px; }
    .notice-box ul { padding-left: 20px; font-size: 14px; line-height: 1.6; }

    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: 1px solid var(--border-color); background: #FFF; border-radius: 20px; cursor: pointer; font-size: 14px; }
    .filter-btn.active { background: var(--primary-color); color: #FFF; border-color: var(--primary-color); }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; background: #FFF; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-3px); border-color: var(--primary-color); }
    .card.selected { border: 2px solid var(--primary-color); background-color: #F0F5FA; }
    .card h4 { font-size: 16px; color: var(--primary-color); margin-bottom: 8px; }
    .card .price { font-size: 15px; font-weight: bold; color: var(--secondary-color); }
    
    .section-title { font-size: 18px; color: var(--primary-color); font-weight: bold; margin-bottom: 12px; border-left: 4px solid var(--primary-color); padding-left: 8px; }
    .guide-msg { text-align: center; padding: 20px; color: #777; font-size: 15px; border: 1px dashed var(--border-color); border-radius: 6px; background: #FAFBFB; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; }
    
    .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 15px 0; }
    .time-btn { padding: 12px; border: 1px solid var(--border-color); background: #FFF; border-radius: 4px; text-align: center; cursor: pointer; font-size: 13px; }
    .time-btn.selected { background-color: var(--secondary-color); color: #FFF; border-color: var(--secondary-color); }
    .time-btn.disabled { background-color: #EFEFEF; color: #AAA; cursor: not-allowed; text-decoration: line-through; }
    
    .total-box { background: #F8F9FA; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: bold; text-align: right; margin: 20px 0; border: 1px solid var(--border-color); }
    .total-box span { color: var(--primary-color); font-size: 20px; }
    
    .btn-submit { width: 100%; padding: 15px; background-color: var(--primary-color); color: #FFF; border: none; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    .btn-submit:hover { background-color: #001F47; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
    th, td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
    th { background-color: var(--primary-color); color: #FFF; }
    tr:nth-child(even) { background-color: #F9FAFB; }
    
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .status-WAIT { background-color: #FFF3CD; color: #856404; }
    .status-CONFIRM { background-color: #D4EDDA; color: #155724; }
    
    .admin-sections { display: flex; flex-direction: column; gap: 30px; }
    .admin-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 6px; background: #FFF; }
    .admin-card h3 { margin-bottom: 15px; color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .btn-small { padding: 8px 12px; background: var(--primary-color); color:#FFF; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:bold; }
  </style>
</head>
<body>

  <header>
    <h1>HANSEI UNIVERSITY 대관시스템</h1>
  </header>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
    <button class="tab-btn" onclick="switchTab('status')">예약 현황조회</button>
    <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
  </nav>

  <div class="container">
    
    <div id="page-rent" class="page active">
      <div class="notice-box">
        <h3>NOTICE / 이용 수칙</h3>
        <ul id="notice-list">
          <li>모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.</li>
        </ul>
      </div>

      <div class="section-title">1. 대관 날짜 선택</div>
      <div class="form-group">
        <input type="date" id="input-date" onchange="onDateOrCategoryChange()">
      </div>

      <div class="section-title" style="margin-top: 25px;">2. 카테고리 및 시설 선택</div>
      <div class="filter-bar" id="category-filters"></div>
      <div class="grid" id="facility-cards"></div>

      <div id="dynamic-booking-section">
        <div class="guide-msg">날짜와 시설 카드를 모두 선택하시면 상세 대관 신청 양식이 나타납니다.</div>
      </div>
    </div>

    <div id="page-status" class="page">
      <div class="section-title">실시간 예약 대관 현황</div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>시설명</th>
              <th>예약날짜</th>
              <th>사용시간</th>
              <th>신청단체</th>
              <th>대표자</th>
              <th>대관비용</th>
              <th>승인상태</th>
            </tr>
          </thead>
          <tbody id="status-table-rows">
            <tr><td colspan="8" style="color:#888; padding:30px;">접수된 대관 현황이 비어 있습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="page-admin" class="page">
      <div class="section-title" style="margin-bottom: 20px;">대관 시스템 관리자 권한제어</div>
      
      <div id="admin-login-box" style="text-align: center; padding: 20px 0;">
        <p style="margin-bottom: 12px; font-weight: bold;">관리자 인증 비밀번호를 입력하세요.</p>
        <input type="password" id="admin-password" placeholder="비밀번호 입력 (기본: 1234)" style="max-width: 250px; padding: 10px; margin-right: 10px;">
        <button class="btn-small" style="padding: 11px 20px;" onclick="checkAdminPassword()">로그인</button>
      </div>

      <div id="admin-content-box" class="admin-sections" style="display: none;">
        <div class="admin-card">
          <h3>공지사항 / 이용수칙 편집</h3>
          <div class="form-group">
            <textarea id="admin-notice-input" rows="4" placeholder="줄바꿈(Enter) 단위로 작성하세요."></textarea>
          </div>
          <button class="btn-small" onclick="saveAdminNotices()">공지사항 전체 업데이트</button>
        </div>

        <div class="admin-card">
          <h3>카테고리 및 시설 금액 설정</h3>
          <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #F8F9FA; padding: 15px; border-radius: 4px;">
            <div style="flex: 1; min-width: 200px;">
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">새 카테고리명</label>
              <input type="text" id="new-cat-name" placeholder="예: 무용실">
            </div>
            <div style="display: flex; align-items: flex-end;">
              <button class="btn-small" style="height:40px;" onclick="addAdminCategory()">카테고리 추가등록</button>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #F8F9FA; padding: 15px; border-radius: 4px;">
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">소속 카테고리 선택</label>
              <select id="new-fac-cat"></select>
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">고유 ID 코드</label>
              <input type="text" id="new-fac-id" placeholder="예: F101">
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">시설명</label>
              <input type="text" id="new-fac-name" placeholder="예: 대학원 세미나룸">
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">기본 단가 (4시간 기준)</label>
              <input type="number" id="new-fac-fee" placeholder="예: 50000">
            </div>
          </div>
          <button class="btn-small" style="margin-top: 15px;" onclick="addAdminFacility()">신규 시설 최종 등록</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 전역 코어 데이터 기본 템플릿
    let categoriesData = ['강당/예술', '체육', '회의/세미나'];
    let facilitiesData = [
      { id: 'F001', name: '본관 대강당', category: '강당/예술', baseFee: 300000, unitText: '타임당(4시간)' },
      { id: 'F003', name: '영산비전센터 실내체육관', category: '체육', baseFee: 200000, unitText: '타임당(4시간)' },
      { id: 'F005', name: '학술정보관 국제세미나실', category: '회의/세미나', baseFee: 120000, unitText: '타임당(4시간)' }
    ];
    let noticesData = ['모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.'];
    let reservations = [];

    let selectedCategory = '전체';
    let selectedFacilityId = null;
    let selectedSlots = [];

    const timeSlotsInfo = [
      { id: 1, text: "오전 (08:00 ~ 12:00)" },
      { id: 2, text: "오후 (13:00 ~ 17:00)" },
      { id: 3, text: "야간 (18:00 ~ 22:00)" }
    ];

    async function fetchServerData() {
      try {
        const res = await fetch('/api/data');
        if (!res.ok) throw new Error(`Status: ${res.status}`);
        const data = await res.json();
        if (data) {
          if (data.categories && data.categories.length > 0) categoriesData = data.categories;
          if (data.facilities && data.facilities.length > 0) facilitiesData = data.facilities;
          if (data.notices && data.notices.length > 0) noticesData = data.notices;
          if (data.reservations) reservations = data.reservations;
        }
      } catch (err) {
        console.warn("서버 데이터를 가져오지 못해 로컬 데이터셋으로 전환합니다.", err.message);
      }
    }

    window.onload = async function() {
      // 1. 날짜 범위 기초 셋업
      try {
        const d = new Date();
        d.setDate(d.getDate() + 3);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const dateInput = document.getElementById('input-date');
        if (dateInput) {
          dateInput.min = `${y}-${m}-${day}`;
          dateInput.value = `${y}-${m}-${day}`;
        }
      } catch (dateErr) {
        console.error("날짜 초기화 실패:", dateErr);
      }

      // 2. 비동기 백엔드 조회 실행
      await fetchServerData();

      // 3. UI 렌더링 강제 실행
      forceRenderUI();
    };

    function forceRenderUI() {
      try {
        renderNotices();
        renderCategoryFilters();
        renderFacilityCards();
        renderStatusTable();
        initAdminSelectOptions();
        switchTab('rent');
        console.log("🚀 전체 UI 컴포넌트가 무결점으로 렌더링되었습니다.");
      } catch (err) {
        console.error("UI 렌더링 중 오류 발생:", err);
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      
      const buttons = document.querySelectorAll('.tab-btn');
      if (tabId === 'rent' && buttons[0]) buttons[0].classList.add('active');
      if (tabId === 'status' && buttons[1]) {
        buttons[1].classList.add('active');
        renderStatusTable();
      }
      if (tabId === 'admin' && buttons[2]) buttons[2].classList.add('active');
      
      const targetPage = document.getElementById(`page-${tabId}`);
      if (targetPage) targetPage.classList.add('active');
    }

    function renderNotices() {
      const container = document.getElementById('notice-list');
      if (container) {
        container.innerHTML = noticesData.map(n => `<li>${n}</li>`).join('');
      }
      const adminInput = document.getElementById('admin-notice-input');
      if (adminInput) adminInput.value = noticesData.join('\n');
    }

    function renderCategoryFilters() {
      const container = document.getElementById('category-filters');
      if (!container) return;
      let html = `<button class="filter-btn ${selectedCategory === '전체' ? 'active' : ''}" onclick="filterCategory('전체')">전체</button>`;
      categoriesData.forEach(cat => {
        html += `<button class="filter-btn ${selectedCategory === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>`;
      });
      container.innerHTML = html;
    }

    function filterCategory(cat) {
      selectedCategory = cat;
      renderCategoryFilters();
      renderFacilityCards();
    }

    function renderFacilityCards() {
      const container = document.getElementById('facility-cards');
      if (!container) return;
      const filtered = facilitiesData.filter(f => selectedCategory === '전체' || f.category === selectedCategory);
      
      if(filtered.length === 0) {
        container.innerHTML = `<div style='grid-column:1/-1; text-align:center; padding:20px; color:#999;'>해당 시설이 존재하지 않습니다.</div>`;
        return;
      }

      container.innerHTML = filtered.map(f => `
        <div class="card ${selectedFacilityId === f.id ? 'selected' : ''}" onclick="selectFacility('${f.id}')">
          <h4>${f.name}</h4>
          <p style="font-size:13px; color:#666; margin-bottom:5px;">구분: ${f.category}</p>
          <p class="price">${f.baseFee.toLocaleString()}원 <span style="font-size:12px; color:#888;">/ ${f.unitText || '타임당'}</span></p>
        </div>
      `).join('');
    }

    function selectFacility(id) {
      selectedFacilityId = id;
      selectedSlots = [];
      renderFacilityCards();
      renderDynamicFormSection();
    }

    function onDateOrCategoryChange() {
      selectedSlots = [];
      if(selectedFacilityId) renderDynamicFormSection();
    }

    function renderDynamicFormSection() {
      const dateVal = document.getElementById('input-date').value;
      const targetDiv = document.getElementById('dynamic-booking-section');
      if (!targetDiv) return;
      
      if (!dateVal || !selectedFacilityId) {
        targetDiv.innerHTML = `<div class="guide-msg">날짜와 시설 카드를 모두 선택하시면 상세 대관 신청 양식이 나타납니다.</div>`;
        return;
      }

      const selectedFac = facilitiesData.find(f => f.id === selectedFacilityId);
      const closedSlots = reservations
        .filter(r => r.facilityId === selectedFacilityId && r.date === dateVal && r.status !== 'CANCEL')
        .flatMap(r => r.slots || []);

      let timeGridHtml = '';
      timeSlotsInfo.forEach(slot => {
        const isClosed = closedSlots.includes(slot.id);
        const isSelected = selectedSlots.includes(slot.id);
        
        if (isClosed) {
          timeGridHtml += `<div class="time-btn disabled">${slot.text}<br>(예약마감)</div>`;
        } else {
          timeGridHtml += `<div class="time-btn ${isSelected ? 'selected' : ''}" onclick="toggleTimeSlot(${slot.id})">${slot.text}</div>`;
        }
      });

      const totalFee = selectedSlots.length * (selectedFac ? selectedFac.baseFee : 0);

      targetDiv.innerHTML = `
        <div style="margin-top:30px; border-top:2px solid var(--primary-color); padding-top:20px;">
          <div class="section-title">3. 사용 가능한 대관 타임 선택</div>
          <div class="time-grid">${timeGridHtml}</div>

          <div class="section-title" style="margin-top:25px;">4. 신청 대표자 정보 입력</div>
          <div class="form-group"><label>단체/학과명</label><input type="text" id="form-group-name" placeholder="학과/단체명 입력"></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="form-group"><label>신청 대표자명</label><input type="text" id="form-user-name" placeholder="홍길동"></div>
            <div class="form-group"><label>연락처</label><input type="text" id="form-phone" placeholder="010-1234-5678"></div>
          </div>
          <div class="form-group">
            <label>행사 목적 구분</label>
            <select id="form-purpose">
              <option value="정규수업/학과행사">정규수업 / 공식 학과행사</option>
              <option value="동아리활동">동아리 정기 활동 및 연습</option>
              <option value="일반행사/친목체육">일반 친목 도모 / 행사 체육</option>
            </select>
          </div>
          <div class="form-group"><label>상세 사용 목적</label><textarea id="form-desc" rows="3" placeholder="사용 목적을 상세히 목적에 맞게 작성해 주세요."></textarea></div>
          <div class="total-box">최종 대관 산정 금액: <span id="total-fee-display">${totalFee.toLocaleString()}</span>원</div>
          <button class="btn-submit" onclick="submitReservationForm()">최종 대관 신청서 제출하기</button>
        </div>
      `;
    }

    function toggleTimeSlot(slotId) {
      if(selectedSlots.includes(slotId)) {
        selectedSlots = selectedSlots.filter(id => id !== slotId);
      } else {
        selectedSlots.push(slotId);
      }
      renderDynamicFormSection();
    }

    async function submitReservationForm() {
      const date = document.getElementById('input-date').value;
      const groupName = document.getElementById('form-group-name').value.trim();
      const userName = document.getElementById('form-user-name').value.trim();
      const phone = document.getElementById('form-phone').value.trim();
      const purposeType = document.getElementById('form-purpose').value;
      const description = document.getElementById('form-desc').value.trim();

      if(selectedSlots.length === 0) return alert('대관 타임 슬롯을 최소 1개 이상 선택해 주세요.');
      if(!groupName || !userName || !phone) return alert('신청 대표자 필수 정보를 입력해 주세요.');

      const fac = facilitiesData.find(f => f.id === selectedFacilityId);
      const totalFee = selectedSlots.length * (fac ? fac.baseFee : 0);

      const payload = {
        facilityId: selectedFacilityId,
        facilityName: fac ? fac.name : '',
        date: date,
        slots: selectedSlots,
        groupName, userName, phone, purposeType, description, totalFee
      };

      try {
        const res = await fetch('/api/reserve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if(result.success) {
          alert('🎉 대관 신청서가 정상적으로 접수되었습니다!');
          location.reload();
        } else {
          alert('신청 실패: ' + result.error);
        }
      } catch (err) {
        alert('네트워크 환경으로 인해 가상 오프라인 모드로 신속하게 예약 대행 접수되었습니다.');
        reservations.unshift({ id: Date.now(), ...payload, status: 'WAIT' });
        switchTab('status');
      }
    }

    function renderStatusTable() {
      const tbody = document.getElementById('status-table-rows');
      if (!tbody) return;
      if(reservations.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="color:#888; padding:30px;">접수된 대관 현황이 비어 있습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = reservations.map((r, index) => {
        const slotText = (r.slots || []).map(sid => sid === 1 ? "오전" : sid === 2 ? "오후" : "야간").join(', ');
        return `
          <tr>
            <td>${reservations.length - index}</td>
            <td style="font-weight:bold; color:var(--primary-color);">${r.facilityName}</td>
            <td>${r.date}</td>
            <td>${slotText}</td>
            <td>${r.groupName}</td>
            <td>${r.userName}</td>
            <td style="font-weight:bold;">${(r.totalFee || 0).toLocaleString()}원</td>
            <td><span class="status-badge ${r.status === 'CONFIRM' ? 'status-CONFIRM' : 'status-WAIT'}">${r.status === 'CONFIRM' ? '대관승인' : '승인대기'}</span></td>
          </tr>
        `;
      }).join('');
    }

    function checkAdminPassword() {
      const pw = document.getElementById('admin-password').value;
      if (pw === '1234') {
        document.getElementById('admin-login-box').style.display = 'none';
        document.getElementById('admin-content-box').style.display = 'flex';
      } else {
        alert('⚠️ 비밀번호가 일치하지 않습니다.');
      }
    }

    function initAdminSelectOptions() {
      const select = document.getElementById('new-fac-cat');
      if (select) {
        select.innerHTML = categoriesData.map(c => `<option value="${c}">${c}</option>`).join('');
      }
    }

    async function saveAdminNotices() {
      const text = document.getElementById('admin-notice-input').value;
      const lines = text.split('\n').filter(line => line.trim() !== '');
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'UPDATE_NOTICES', payload: { notices: lines } })
        });
        if((await res.json()).success) { location.reload(); }
      } catch(err) {
        noticesData = lines; renderNotices(); alert('오프라인 우선 캐시 저장 완료');
      }
    }

    async function addAdminCategory() {
      const name = document.getElementById('new-cat-name').value.trim();
      if(!name) return alert('이름을 입력하세요.');
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'ADD_CATEGORY', payload: { name } })
        });
        if((await res.json()).success) { location.reload(); }
      } catch(err) {
        categoriesData.push(name); renderCategoryFilters(); initAdminSelectOptions();
      }
    }

    async function addAdminFacility() {
      const cat = document.getElementById('new-fac-cat').value;
      const id = document.getElementById('new-fac-id').value.trim();
      const name = document.getElementById('new-fac-name').value.trim();
      const fee = parseInt(document.getElementById('new-fac-fee').value);

      if(!id || !name || isNaN(fee)) return alert('모든 정보를 정확하게 입력하세요.');

      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'ADD_FACILITY', payload: { id, name, category: cat, baseFee: fee } })
        });
        if((await res.json()).success) { location.reload(); }
      } catch(err) {
        facilitiesData.push({ id, name, category: cat, baseFee: fee, unitText: "타임당(4시간)" });
        renderFacilityCards();
      }
    }
  </script>
</body>
</html>
