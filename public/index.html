<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한세대학교 대관시스템</title>
  <style>
    :root { --primary-color: #002F6C; --secondary-color: #8A7355; --bg-light: #F4F6F9; }
    body { background-color: var(--bg-light); padding-bottom: 60px; font-family: 'Malgun Gothic', sans-serif; }
    header { background: #FFF; padding: 20px; text-align: center; border-bottom: 3px solid var(--secondary-color); }
    header h1 { color: var(--primary-color); font-size: 24px; font-weight: bold; }
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #FFF; font-weight: bold; cursor: pointer; }
    .tab-btn.active { background-color: var(--secondary-color); }
    .container { max-width: 1100px; margin: 20px auto; padding: 20px; background: #FFF; border-radius: 8px; }
    .page { display: none; }
    .page.active { display: block; }
    .notice-box { background: #FFFDE7; border: 1px solid #FFE082; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
    .card { border: 1px solid #DDD; padding: 20px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
    .card.selected { border: 2px solid var(--primary-color); background: #F0F5FA; }
    .admin-panel { border-top: 2px solid #ccc; margin-top: 20px; padding-top: 20px; }
    .edit-row { display: flex; gap: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <header><h1>HANSEI UNIVERSITY 대관시스템</h1></header>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
    <button class="tab-btn" onclick="switchTab('status')">예약 현황조회</button>
    <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
  </nav>

  <div class="container">
    <div id="page-rent" class="page active">
      <div class="notice-box">
        <strong>공지사항</strong>
        <p id="notice-text">• 모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.</p>
      </div>
      <div id="facility-cards"></div>
      <div id="booking-form" style="display:none;">
        <input type="text" id="user-name" placeholder="성함">
        <button onclick="submitBooking()" style="margin-top:20px; width:100%; background:var(--primary-color); color:#FFF; padding:15px;">신청하기</button>
      </div>
    </div>

    <div id="page-admin" class="page">
      <div id="admin-login-area">
        <input type="password" id="admin-pw" placeholder="비밀번호">
        <button onclick="checkAdmin()">로그인</button>
      </div>
      
      <div id="admin-dashboard" class="admin-panel" style="display:none;">
        <h3>관리자 설정</h3>
        <div style="margin-bottom:20px;">
          <h4>1. 공지사항 수정</h4>
          <input type="text" id="new-notice" style="width:100%;" placeholder="새 공지사항 입력">
          <button onclick="updateNotice()">공지사항 적용</button>
        </div>
        <div>
          <h4>2. 시설 및 금액 관리</h4>
          <div id="admin-facility-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let facilities = [
      { id: 1, name: '본관 대강당', fee: '300,000원' },
      { id: 2, name: '실내체육관', fee: '200,000원' },
      { id: 3, name: '국제세미나실', fee: '120,000원' }
    ];

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('page-' + tabId).classList.add('active');
    }

    function renderFacilities() {
      const cardDiv = document.getElementById('facility-cards');
      cardDiv.innerHTML = facilities.map(f => `
        <div class="card" onclick="document.getElementById('booking-form').style.display='block'">
          <strong>${f.name}</strong><br><span>이용료: ${f.fee}</span>
        </div>
      `).join('');
    }

    function checkAdmin() {
      if(document.getElementById('admin-pw').value === '1234') {
        document.getElementById('admin-login-area').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
        renderAdminList();
      } else { alert('비밀번호가 틀렸습니다.'); }
    }

    function updateNotice() {
      document.getElementById('notice-text').innerText = document.getElementById('new-notice').value;
      alert('공지사항이 업데이트되었습니다.');
    }

    function renderAdminList() {
      const list = document.getElementById('admin-facility-list');
      list.innerHTML = facilities.map(f => `
        <div class="edit-row">
          <input type="text" id="name-${f.id}" value="${f.name}">
          <input type="text" id="fee-${f.id}" value="${f.fee}">
          <button onclick="saveFacility(${f.id})">수정</button>
        </div>
      `).join('');
    }

    function saveFacility(id) {
      const f = facilities.find(x => x.id === id);
      f.name = document.getElementById('name-'+id).value;
      f.fee = document.getElementById('fee-'+id).value;
      renderFacilities();
      alert('수정 완료!');
    }

    window.onload = renderFacilities;
  </script>
</body>
</html>
