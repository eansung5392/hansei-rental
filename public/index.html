<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한세대학교 대관시스템</title>
  <style>
    :root { --primary-color: #002F6C; --secondary-color: #8A7355; --bg-light: #F4F6F9; }
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: var(--bg-light); }
    header { background: #FFF; padding: 20px; text-align: center; border-bottom: 3px solid var(--secondary-color); }
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { padding: 15px 30px; border: none; color: #FFF; font-weight: bold; cursor: pointer; background: none; }
    .tab-btn.active { background-color: var(--secondary-color); }
    .container { max-width: 800px; margin: 20px auto; padding: 20px; background: #FFF; border-radius: 8px; }
    .page { display: none; }
    .page.active { display: block; }
    .notice-box { background: #FFFDE7; border: 1px solid #FFE082; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
    .step { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    .card { padding: 15px; border: 1px solid #ccc; margin: 5px 0; cursor: pointer; border-radius: 5px; }
    .card.selected { border: 2px solid var(--primary-color); background: #eef; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { cursor: pointer; padding: 10px 15px; border: none; background: var(--primary-color); color: white; border-radius: 4px; }
  </style>
</head>
<body>

<header><h1>HANSEI UNIVERSITY 대관시스템</h1></header>
<nav class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
  <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
</nav>

<div class="container">
  <div id="page-rent" class="page active">
    <div class="notice-box">
      <strong>공지사항</strong>
      <p id="notice-content">• 모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.</p>
    </div>
    <div class="step">
      <b>1. 대관 일자 선택</b><br><input type="date" id="rent-date">
    </div>
    <div class="step">
      <b>2. 대관 장소 선택</b><div id="facility-list"></div>
    </div>
    <div class="step">
      <b>3. 신청 정보 입력</b>
      <input type="text" id="group" placeholder="소속/단체명">
      <input type="text" id="name" placeholder="성명">
      <input type="text" id="phone" placeholder="연락처">
      <textarea id="memo" placeholder="메모/요청사항"></textarea>
    </div>
    <button onclick="submitRent()" style="width:100%; padding:15px; font-weight:bold;">신청 완료</button>
  </div>

  <div id="page-admin" class="page">
    <div id="login-box">
      <input type="password" id="pw" placeholder="비밀번호"><button onclick="checkAdmin()">로그인</button>
    </div>
    <div id="admin-box" style="display:none;">
      <h3>관리자 대시보드</h3>
      <div style="margin-bottom:20px;">
        <h4>공지사항 수정</h4>
        <textarea id="new-notice-text" placeholder="새 공지사항을 입력하세요"></textarea>
        <button onclick="updateNotice()">공지사항 적용</button>
      </div>
      <hr>
      <h3>예약 현황</h3>
      <div id="booking-list" style="border:1px solid #ddd; padding:10px; margin-bottom:20px; border-radius:4px;"></div>
      <hr>
      <h3>시설 및 금액 관리</h3>
      <div id="admin-facility-list"></div>
      <div style="margin-top:20px;">
        <input type="text" id="new-name" placeholder="시설명">
        <input type="text" id="new-fee" placeholder="이용료">
        <button onclick="addFacility()">시설 추가</button>
      </div>
    </div>
  </div>
</div>

<script>
  let facilities = JSON.parse(localStorage.getItem('facilities')) || [{id:1, name:'본관 대강당', fee:'300,000원'}];
  let bookings = JSON.parse(localStorage.getItem('myBookings')) || [];
  let selectedFac = "";

  function switchTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    event.target.classList.add('active');
  }

  function updateNotice() {
    const text = document.getElementById('new-notice-text').value;
    document.getElementById('notice-content').innerText = text;
    localStorage.setItem('notice', text);
    alert('공지사항이 변경되었습니다.');
  }

  function renderUI() {
    const list = document.getElementById('facility-list');
    list.innerHTML = facilities.map(f => `<div class="card" onclick="selectFac(this, '${f.name}')">${f.name} (${f.fee})</div>`).join('');
    
    document.getElementById('admin-facility-list').innerHTML = facilities.map(f => `
      <div style="margin:5px 0;">${f.name} - ${f.fee} <button onclick="delFacility(${f.id})" style="background:#cc0000;">삭제</button></div>
    `).join('');
  }

  function selectFac(el, name) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedFac = name;
  }

  function submitRent() {
    if(!selectedFac) { alert("장소를 선택해주세요!"); return; }
    bookings.push({ date: document.getElementById('rent-date').value, fac: selectedFac, name: document.getElementById('name').value });
    localStorage.setItem('myBookings', JSON.stringify(bookings));
    alert('신청이 완료되었습니다!');
  }

  function checkAdmin() {
    if(document.getElementById('pw').value === '1234') {
      document.getElementById('admin-box').style.display = 'block';
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('booking-list').innerHTML = bookings.map(b => `<div>${b.date} / ${b.fac} / 신청자: ${b.name}</div>`).join('') || "예약 없음";
    } else alert('비밀번호 오류');
  }

  function addFacility() {
    facilities.push({id: Date.now(), name: document.getElementById('new-name').value, fee: document.getElementById('new-fee').value});
    localStorage.setItem('facilities', JSON.stringify(facilities));
    renderUI();
  }

  function delFacility(id) {
    facilities = facilities.filter(f => f.id !== id);
    localStorage.setItem('facilities', JSON.stringify(facilities));
    renderUI();
  }

  // 초기화 및 로드
  document.getElementById('notice-content').innerText = localStorage.getItem('notice') || "• 모든 대관은 사용일 최소 3일 전에 신청 완료되어야 승인이 가능합니다.";
  renderUI();
</script>
</body>
</html>
