<div id="page-admin" class="page">
  <div id="login-box">
    <input type="password" id="pw" placeholder="비밀번호">
    <button onclick="checkAdmin()">로그인</button>
  </div>
  
  <div id="admin-box" style="display:none;">
    <h3>관리자 대시보드</h3>
    
    <h4>예약 현황 리스트</h4>
    <div id="admin-booking-list" style="border:1px solid #ccc; padding:10px; margin-bottom:20px;">
      <p>조회된 예약이 없습니다.</p>
    </div>

    <hr>
    
    <h4>시설 및 금액 관리</h4>
    <div id="admin-facility-list"></div>
    </div>
</div>

<script>
  // 신청된 데이터를 저장할 배열 (실제 서버가 없으므로 로컬 메모리 활용)
  let bookings = []; 

  // 대관 신청 시 데이터 저장
  function submitRent() {
    const data = {
      date: document.getElementById('rent-date').value,
      group: document.getElementById('group').value,
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value
    };
    bookings.push(data); // 배열에 추가
    alert('신청이 완료되었습니다!');
  }

  // 관리자 모드에서 예약 리스트 렌더링
  function renderBookings() {
    const list = document.getElementById('admin-booking-list');
    if(bookings.length === 0) {
      list.innerHTML = "<p>현재 접수된 예약이 없습니다.</p>";
    } else {
      list.innerHTML = bookings.map(b => `
        <div style="border-bottom:1px solid #eee; padding:5px;">
          [${b.date}] ${b.group} - ${b.name} (${b.phone})
        </div>
      `).join('');
    }
  }

  // checkAdmin 함수 내부에 추가
  function checkAdmin() {
    if(document.getElementById('pw').value === '1234') {
      document.getElementById('admin-box').style.display = 'block';
      document.getElementById('login-box').style.display = 'none';
      renderList();
      renderBookings(); // 관리자 로그인 시 예약 내역도 로드
    } else alert('비밀번호가 틀렸습니다.');
  }
</script>
