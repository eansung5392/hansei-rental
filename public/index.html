<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한세대학교 대관시스템</title>
  <style>
    :root {
      --primary-color: #002F6C;
      --secondary-color: #8A7355;
      --bg-light: #F4F6F9;
      --text-dark: #333333;
      --border-color: #DDE2E5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', dotum, sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 60px; }
    header { background-color: #FFFFFF; border-bottom: 3px solid var(--secondary-color); padding: 20px; text-align: center; }
    header h1 { color: var(--primary-color); font-size: 24px; font-weight: bold; }
    .nav-tabs { display: flex; justify-content: center; background-color: var(--primary-color); }
    .tab-btn { flex: 1; max-width: 200px; padding: 15px; background: none; border: none; color: #FFFFFF; font-size: 16px; font-weight: bold; cursor: pointer; }
    .tab-btn.active { background-color: var(--secondary-color); }
    .container { max-width: 1100px; margin: 20px auto; padding: 20px; background: #FFFFFF; border-radius: 8px; }
    .page { display: none; }
    .page.active { display: block; }
    .section-title { font-size: 18px; color: var(--primary-color); font-weight: bold; margin-bottom: 12px; border-left: 4px solid var(--primary-color); padding-left: 8px; }
    .card { border: 1px solid var(--border-color); padding: 15px; margin-bottom: 10px; cursor: pointer; }
    .card.selected { border: 2px solid var(--primary-color); background: #F0F5FA; }
  </style>
</head>
<body>

  <header>
    <h1>HANSEI UNIVERSITY 대관시스템</h1>
  </header>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('rent')">대관 신청하기</button>
    <button class="tab-btn" onclick="switchTab('status')">예약 현황조회</button>
    <button class="tab-btn" onclick="switchTab('admin')">관리자 대시보드</button>
  </nav>

  <div class="container">
    <div id="page-rent" class="page active">
      <div class="section-title">1. 대관 날짜 선택</div>
      <input type="date" id="input-date" onchange="onDateOrCategoryChange()" style="padding:10px; width:100%;">
      
      <div class="section-title" style="margin-top:25px;">2. 시설 선택</div>
      <div id="facility-cards"></div>
      <div id="dynamic-booking-section" style="margin-top:20px;"></div>
    </div>

    <div id="page-status" class="page">
      <div class="section-title">예약 현황조회</div>
      <p>접수된 내역이 없습니다.</p>
    </div>

    <div id="page-admin" class="page">
      <div class="section-title">관리자 대시보드</div>
      <input type="password" id="admin-password" placeholder="비밀번호 입력">
      <button onclick="checkAdminPassword()">로그인</button>
    </div>
  </div>

  <script>
    // 탭 전환 함수
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      
      const buttons = document.querySelectorAll('.nav-tabs button');
      if (tabId === 'rent') buttons[0].classList.add('active');
      if (tabId === 'status') buttons[1].classList.add('active');
      if (tabId === 'admin') buttons[2].classList.add('active');
      
      document.getElementById('page-' + tabId).classList.add('active');
    }

    // 날짜 변경 시 호출
    function onDateOrCategoryChange() {
      console.log("날짜가 변경되었습니다.");
    }

    // 관리자 로그인 함수
    function checkAdminPassword() {
      const pw = document.getElementById('admin-password').value;
      if (pw === '1234') {
        alert('관리자 모드 활성화');
      } else {
        alert('비밀번호가 틀렸습니다.');
      }
    }

    // 초기화
    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('input-date').value = today;
    };
  </script>
</body>
</html>
